services:
  app:
    build:
      context: ./backend
    container_name: travel_app
    volumes:
      - ./backend:/var/www
    networks:
      - travel_net
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: travel_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - travel_net

  db:
    image: mysql:8.0
    container_name: travel_db
    environment:
      MYSQL_DATABASE: travel_orders
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - travel_net

  frontend:
    build:
      context: ./frontend
    container_name: travel_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - travel_net

  redis:
    image: redis:alpine
    container_name: travel_redis
    ports:
      - "6379:6379"
    networks:
      - travel_net

volumes:
  dbdata:

networks:
  travel_net:
    driver: bridge